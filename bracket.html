<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026年世界斯诺克锦标赛</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #111a34;
      --line: #30446f;
      --lineStrong: rgba(125,211,252,.5);
      --lineSoft: rgba(125,211,252,.26);
      --text: #edf2ff;
      --muted: #9fb0d6;
      --accent: #7dd3fc;
      --accent2: #a78bfa;
      --win: #86efac;
      --shadow: 0 16px 42px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #102146 0%, var(--bg) 55%);
    }
    .page { max-width: none; margin: 0; padding: 60px 8px 28px; }
    .footer { display: none; }
    .footer span { margin: 0 12px; }
    .hero {
      position: relative;
      background: linear-gradient(135deg, rgba(125,211,252,.12), rgba(167,139,250,.12));
      border: 1px solid rgba(125,211,252,.2);
      border-radius: 22px;
      padding: 30px 22px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -20px;
      right: 0;
      width: 400px;
      height: calc(100% + 40px);
      background: url('https://images.gc.wstservices.co.uk/fit-in/400x600/62fb7820-1ed9-11f1-9f86-872d5dabf567.jpg') no-repeat center 30%;
      background-size: cover;
      opacity: 0.5;
      mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
      -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
      mix-blend-mode: screen;
      z-index: 0;
      pointer-events: none;
    }
    .hero h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 48px;
      letter-spacing: 4px;
      text-align: center;
      font-weight: 900;
      /* 冠军金属渐变色 */
      background: linear-gradient(180deg, #fff7d6 0%, #d4af37 40%, #aa771c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      /* 弥散光影 */
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.8)) drop-shadow(0 0 20px rgba(212,175,55,0.3));
    }
    .layout { display: block; }
    .card {
      background: rgba(17,26,52,.88);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 8px;
      box-shadow: var(--shadow);
    }
    .toolbar { display: block; margin-bottom: 8px; }
    .toolbar h2 { margin: 0; font-size: 20px; display:none; }

    .bracket-wrap {
      overflow: auto;
      padding: 4px 8px 8px 4px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      position: relative;
    }
    .bracket-stage { position: relative; min-width: auto; width: 100%; }
    .bracket {
      display: grid;
      grid-template-columns: minmax(240px, auto);
      grid-auto-columns: minmax(320px, 1fr);
      grid-auto-flow: column;
      gap: 8px 48px;
      width: max-content;
      min-width: 100%;
      align-items: start;
      position: relative;
      z-index: 2;
    }
    .round[data-round-index="4"] { display: none !important; }
    .round[data-round-index="0"] { opacity: 0.5; }
    .round:not([data-round-index="0"]) { opacity: 1; }
    .round:not([data-round-index="0"]) .round-title { box-shadow: 0 0 20px rgba(125,211,252,.4), 0 8px 20px rgba(0,0,0,.16); border-color: rgba(125,211,252,.6); }
    .round:not([data-round-index="0"]) .match { border-color: rgba(125,211,252,.4); padding: 8px; margin-bottom: 12px; border-width: 2px; }
    .round:not([data-round-index="0"]) .name-zh { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
    .round:not([data-round-index="0"]) .score { font-size: 28px; }
    .round:not([data-round-index="0"]) .slot { min-height: 92px; padding: 12px 12px; gap: 10px; }
    .round:not([data-round-index="0"]) .avatar-3d-wrap {
      width: 56px; height: 56px;
      box-shadow: 0 8px 16px -4px rgba(0,0,0,0.8), 0 0 0 2px rgba(17,26,52,0.9), 0 0 0 4px rgba(125,211,252,0.4), inset 0 0 0 1px rgba(255,255,255,.6);
      position: relative; z-index: 10;
    }
    .round:not([data-round-index="0"]) .slot-left:hover .avatar-3d-wrap { transform: scale(1.06); }
    .round:not([data-round-index="0"]) .flag { font-size: 26px; margin-left: 2px; }
    .round:not([data-round-index="0"]) .seed { font-size: 16px; }
    /* 8 强及以后进一步增大 */
    .round:is([data-round-index="2"], [data-round-index="3"], [data-round-index="4"]) .slot { min-height: 116px; padding: 18px 14px; gap: 14px; }
    .round:is([data-round-index="2"], [data-round-index="3"], [data-round-index="4"]) .avatar-3d-wrap { width: 72px; height: 72px; }
    .round:is([data-round-index="2"], [data-round-index="3"], [data-round-index="4"]) .name-zh { font-size: 30px; }
    .round:is([data-round-index="2"], [data-round-index="3"], [data-round-index="4"]) .score { font-size: 36px; }
    .round:is([data-round-index="2"], [data-round-index="3"], [data-round-index="4"]) .flag { font-size: 32px; }
    .bracket-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .round { display: grid; gap: 16px; position: relative; }
    .round-title {
      position: sticky; top: 0; z-index: 2; padding: 16px 20px; text-align: center; border-radius: 14px;
      border: 1px solid var(--lineStrong); background: linear-gradient(180deg, rgba(21,34,70,.98), rgba(17,26,52,.98)); color: var(--accent); font-weight: 800;
      box-shadow: 0 8px 20px rgba(0,0,0,.16), inset 0 1px 0 rgba(125,211,252,.15);
      font-size: 24px;
      letter-spacing: 1px;
    }
    .round-sub { display: none; }
    .round-bo { font-size: 16px; font-weight: 500; opacity: 0.8; margin-left: 8px; }
    .match {
      position: relative; border: 1px solid var(--line); border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015));
      box-shadow: 0 8px 22px rgba(0,0,0,.18);
    }
    .match.live { border-color: rgba(125,211,252,.55); box-shadow: 0 0 0 1px rgba(125,211,252,.18), 0 10px 28px rgba(0,0,0,.18); }
    .match.finished { border-color: rgba(134,239,172,.28); }
    .match-meta { display: none; }
    .status-pill { display: none; }
    .status-live { display: none; }
    .status-finished { display: none; }
    .status-pending { display: none; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px; border-radius: 999px;
      padding: 3px 8px; font-size: 11px; font-weight: 700; border: 1px solid rgba(255,255,255,.08); white-space: nowrap;
    }
    .status-live { color: var(--accent); border-color: rgba(125,211,252,.35); background: rgba(125,211,252,.08); animation: livePulse 2s ease-in-out infinite; }
    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(125,211,252,.4); }
      50% { box-shadow: 0 0 8px 2px rgba(125,211,252,.2); }
    }
    .status-finished { color: var(--win); border-color: rgba(134,239,172,.3); background: rgba(134,239,172,.08); }
    .status-pending { color: var(--muted); border-color: rgba(170,180,214,.18); background: rgba(255,255,255,.03); }
    .slot {
      display: grid; grid-template-columns: 1fr auto auto; gap: 6px; align-items: center;
      padding: 8px 6px; border-bottom: 1px dashed rgba(170,180,214,.12); min-height: 58px;
    }
    .slot:last-child { border-bottom: none; }
    .slot.winner { background: linear-gradient(90deg, rgba(134,239,172,.15) 0%, transparent 100%); border-left: 3px solid #86efac; }
    .slot.loser { opacity: 0.45; }
    .slot.chinese-player { background: radial-gradient(circle at left, rgba(251,191,36,0.06) 0%, transparent 70%); }
    .slot.chinese-player.winner { background: linear-gradient(90deg, rgba(251,191,36,0.15) 0%, transparent 100%); border-left-color: #fbbf24; }
    .slot.placeholder { color: var(--muted); }
    .live-badge {
      position: absolute; top: 16px; left: 16px; background: rgba(239, 68, 68, 0.9); color: #fff;
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 800; letter-spacing: 1px;
      z-index: 10; box-shadow: 0 0 12px rgba(239,68,68,0.6); display: flex; align-items: center; gap: 6px;
    }
    .live-badge::before { content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: livePulse 1.5s infinite; }
    .slot.source-pending { background: rgba(255,255,255,.02); border-left: 3px solid rgba(125,211,252,.28); }
    .slot-left { display: flex; gap: 9px; align-items: center; min-width: 0; text-decoration: none; color: inherit; position: relative; }
    .avatar-3d-wrap {
      width: 34px; height: 34px; position: relative; flex: 0 0 auto; border-radius: 50%;
      background: radial-gradient(circle at top, rgba(30,41,59,0.9), rgba(15,23,42,1));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.14); transition: transform .18s ease;
    }
    .slot-left:hover .avatar-3d-wrap { transform: scale(1.06); box-shadow: inset 0 0 0 1px rgba(125,211,252,.55); z-index: 10; }
    .avatar-base { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; position: absolute; top: 0; left: 0; z-index: 1; }
    .avatar-img {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 122%; height: 122%; object-fit: cover; object-position: top center;
    }
    .avatar-img.pop-out { z-index: 2; clip-path: inset(-50% -50% 50% -50%); }
    .flag { font-size: 20px; line-height: 1; flex: 0 0 auto; }
    .names { min-width: 0; }
    .name-en { display: none; }
    .name-zh { color: var(--text); font-size: 22px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .name-zh.chinese { color: #fbbf24; }
    .seed { color: var(--accent2); font-size: 16px; margin-left: 6px; }
    .score { min-width: 32px; text-align: center; color: var(--win); font-weight: 800; font-size: 24px; }
    .status-inline, .status-inline-live, .status-inline-finished, .status-inline-pending { display: none !important; }
    .score-input {
      width: 32px; text-align: center; color: var(--win); font-weight: 800; font-size: 14px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 8px;
      padding: 4px 2px; outline: none;
    }
    .score-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(125,211,252,.14); }
    .slot-left[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute; left: 12px; bottom: calc(100% + 8px); max-width: 220px; white-space: normal;
      background: rgba(8,17,31,.96); color: #eef2ff; border: 1px solid rgba(125,211,252,.25);
      border-radius: 10px; padding: 8px 10px; font-size: 12px; line-height: 1.4;
      box-shadow: 0 12px 28px rgba(0,0,0,.28); z-index: 5; pointer-events: none;
    }
    .watermark-bg {
      position: absolute; top: 40%; left: 35%; transform: translate(-50%, -50%) rotate(-15deg);
      font-size: 26px; font-weight: 800; color: rgba(255,255,255,0.06);
      white-space: nowrap; pointer-events: none; z-index: 10; letter-spacing: 4px; user-select: none;
    }
    @media print {
      body { background: #08111f; }
      .page { max-width: none; padding: 0; }
      .hero, .card { box-shadow: none; }
      .bracket-wrap { overflow: visible; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="live-badge" id="heroBadge">LIVE UPDATE</div>
      <h1>2026年世界斯诺克锦标赛</h1>
    </section>

    <div class="layout">
      <section class="card">
        <div class="toolbar"><h2>比赛对阵图</h2></div>
        <div class="bracket-wrap">
          <div class="bracket-stage" id="bracketStage">
            <svg class="bracket-svg" id="bracketSvg"></svg>
            <div class="watermark-bg">@切比雪夫不懂事</div>
            <div id="bracket" class="bracket"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script id="fallback-data" type="application/json">{"tournament":{"nameZh":"2026年世界斯诺克锦标赛","format":"32强 → 16强 → 8强 → 4强 → 决赛"},"rounds":[]}</script>
  <script id="fallback-profiles" type="application/json">{"players":[]}</script>
  <script>
    let PROFILE_MAP = {};

    const normalizePlayer = (player) => {
      if (!player) return { en: '--', zh: '待定', flag: '', seed: null, score: null, avatar: '' };
      const base = {
        en: player.en || '--', zh: player.zh || (player.en ? '' : '待定'), flag: player.flag || '',
        seed: player.seed ?? null, score: player.score ?? null, avatar: player.avatar || ''
      };
      const prof = PROFILE_MAP[base.en];
      if (prof) {
        if (!base.avatar && prof.avatar) base.avatar = prof.avatar;
        if ((!base.flag || base.flag === '🏴') && prof.flag) base.flag = prof.flag;
      }
      return base;
    };

    const advancePlayer = (player) => {
  const p = normalizePlayer(player);
  p.score = null;
  return p;
};

    const inferStatus = (match) => {
      const players = match.players || [];
      const vals = players.map(p => typeof p.score === 'number' ? p.score : null);
      const numeric = vals.filter(v => v !== null);
      if (numeric.length === 0) return 'pending';
      if (numeric.length < 2) return 'live';
      const [a, b] = vals;
      if (a === b) return 'live';
      const bestOf = Number(match.bestOf || 0);
      const winsNeeded = bestOf > 0 ? Math.floor(bestOf / 2) + 1 : null;
      const maxScore = Math.max(a, b);
      if (winsNeeded && maxScore >= winsNeeded) return 'finished';
      return 'live';
    };

    const winnerOf = (match) => {
      if (!match || !match.players || match.players.length < 2) return null;
      const status = match.status || inferStatus(match);
      if (status !== 'finished') return null;
      const [a, b] = match.players;
      const sa = typeof a.score === 'number' ? a.score : null;
      const sb = typeof b.score === 'number' ? b.score : null;
      if (sa === null || sb === null || sa === sb) return null;
      return sa > sb ? a : b;
    };

    const pendingSourcePlayer = () => ({ en: '--', zh: '待定', flag: '', seed: null, score: null, sourcePending: true, avatar: '' });

    const hydrateRounds = (rounds) => {
      console.log('hydrateRounds input:', rounds?.length, 'rounds');
      const cloned = JSON.parse(JSON.stringify(rounds || []));
      if (!cloned.length) { console.log('No rounds, returning empty'); return cloned; }
      console.log('First round matches:', cloned[0].matches?.length);
      // First round: use data as-is
      cloned[0].matches = cloned[0].matches.map(m => ({ ...m, players: (m.players || []).map(normalizePlayer), status: m.status || inferStatus(m) }));
      // Later rounds: only populate if match has no players (auto-advance from previous round)
      for (let i = 1; i < cloned.length; i++) {
        const prev = cloned[i - 1].matches || [];
        const cur = cloned[i].matches || [];
        cur.forEach((match, idx) => {
          // Only auto-populate if no explicit player data exists
          if (!match.players || match.players.length < 2 || !match.players[0].en || match.players[0].en === '--') {
            const leftWinner = winnerOf(prev[idx * 2]);
            const rightWinner = winnerOf(prev[idx * 2 + 1]);
            match.players = [leftWinner ? advancePlayer(leftWinner) : pendingSourcePlayer(), rightWinner ? advancePlayer(rightWinner) : pendingSourcePlayer()];
          } else {
            // Use existing player data from JSON
            match.players = (match.players || []).map(normalizePlayer);
          }
          match.status = match.status || inferStatus(match);
        });
      }
      console.log('hydrateRounds output:', cloned.length, 'rounds');
      return cloned;
    };

    const render = (data) => {
      console.log('render called with data:', data);
      const rounds = hydrateRounds(data.rounds || []);
      console.log('rendering', rounds.length, 'rounds');
      document.getElementById('bracket').innerHTML = rounds.map((round, idx) => `
        <div class="round" data-round-index="${idx}">
          <div class="round-title">${round.title} <span class="round-bo">(BO${round.matches?.[0]?.bestOf || ''})</span><span class="round-sub">${round.subtitle || ''}</span></div>
          ${(round.matches || []).map((match, matchIdx) => {
            const [a, b] = (match.players || [null, null]).map(normalizePlayer);
            const winner = winnerOf(match);
            const status = match.status || inferStatus(match);
            const statusLabel = status === 'live' ? 'Live' : status === 'finished' ? 'Finish' : 'TBD';
            const statusClass = status === 'live' ? 'status-inline-live' : status === 'finished' ? 'status-inline-finished' : 'status-inline-pending';
            const slot = (p, playerIndex) => {
              const tooltip = [p.zh, p.en].filter(Boolean).join(' · ');
              const href = PROFILE_MAP[p.en]?.wstProfile || '';
              const DEFAULT_AVATAR = 'https://images.gc.wstservices.co.uk/fit-in/400x600/9852f230-bb73-11ee-88c0-bd1a9999a15b.png';
              const avatarSrc = p.en === '--' ? DEFAULT_AVATAR : (p.avatar || '');
              const avatarHtml = avatarSrc ? `<div class="avatar-3d-wrap"><div class="avatar-base"><img class="avatar-img" src="${avatarSrc}" alt="${p.en}" loading="lazy" /></div><img class="avatar-img pop-out" src="${avatarSrc}" alt="${p.en}" loading="lazy" /></div>` : '';
              const isWinner = winner && winner.en === p.en;
              const isLoser = status === 'finished' && !isWinner && p.en !== '--';
              const isChinese = p.flag === '🇨🇳';
              const inner = `${avatarHtml}<div class="flag">${p.flag || ''}</div><div class="names"><div class="name-zh ${isChinese ? 'chinese' : ''}">${p.zh || ''}${p.seed ? `<span class="seed">(${p.seed})</span>` : ''}</div></div>`;
              const scoreWithStatus = typeof p.score === 'number'
                ? `<div class="score">${p.score}</div>`
                : `<div class="score">–</div>`;
              const statusNode = (playerIndex === 1 && status) ? `<span class="status-inline ${statusClass}">${statusLabel}</span>` : '';
              return `<div class="slot ${isWinner ? 'winner' : ''} ${isLoser ? 'loser' : ''} ${isChinese ? 'chinese-player' : ''} ${p.en === '--' ? 'placeholder' : ''} ${p.sourcePending ? 'source-pending' : ''}">${href && p.en !== '--' ? `<a class="slot-left" data-tooltip="${tooltip}" href="${href}" target="_blank" rel="noreferrer">${inner}</a>` : `<div class="slot-left" data-tooltip="${tooltip}">${inner}</div>`}${scoreWithStatus}${statusNode}</div>`;
            };
            return `<div class="match ${status}" data-round="${idx}" data-match="${matchIdx}">${slot(a,0)}${slot(b,1)}</div>`;
          }).join('')}
        </div>`).join('');
      relayoutAndRedraw();
      bindScoreInputs();
    };

    const bindScoreInputs = () => {
      document.querySelectorAll('.score-input').forEach(input => {
        input.addEventListener('change', async (e) => {
          const el = e.currentTarget;
          const matchId = el.dataset.matchId;
          const playerIndex = Number(el.dataset.playerIndex);
          const raw = el.value.trim();
          const score = raw === '' ? '' : Number(raw);
          try {
            const res = await fetch('/api/update-score', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ matchId, playerIndex, score })
            });
            const json = await res.json();
            if (!json.ok) throw new Error(json.error || 'save failed');
            render(json.data);
          } catch (err) {
            alert('保存失败：' + (err.message || err));
          }
        });
      });
    };

    const layoutRounds = () => {
      const bracket = document.getElementById('bracket');
      if (!bracket) return;
      const rounds = Array.from(bracket.querySelectorAll('.round'));
      const minGap = 18;
      rounds.forEach((round, idx) => { if (idx !== 0) round.querySelectorAll('.match').forEach(m => m.style.marginTop = '0px'); });
      for (let r = 1; r < rounds.length; r++) {
        const prevRound = rounds[r - 1];
        const round = rounds[r];
        const prevMatches = Array.from(prevRound.querySelectorAll('.match'));
        const matches = Array.from(round.querySelectorAll('.match'));
        const roundRect = round.getBoundingClientRect();
        const title = round.querySelector('.round-title');
        let lastBottom = title ? (title.getBoundingClientRect().bottom - roundRect.top + 16) : 0;
        matches.forEach((match, idx) => {
          const sourceA = prevMatches[idx * 2], sourceB = prevMatches[idx * 2 + 1];
          if (!sourceA || !sourceB) return;
          const a = sourceA.getBoundingClientRect(), b = sourceB.getBoundingClientRect(), m = match.getBoundingClientRect();
          const targetCenter = ((a.top + a.height / 2) + (b.top + b.height / 2)) / 2;
          const currentTop = m.top - roundRect.top;
          let desiredTop = targetCenter - roundRect.top - m.height / 2;
          if (desiredTop < lastBottom) desiredTop = lastBottom;
          const delta = desiredTop - currentTop;
          if (delta > 0) match.style.marginTop = `${delta}px`;
          const finalTop = currentTop + Math.max(delta, 0);
          lastBottom = finalTop + m.height + minGap;
        });
      }
    };

    const drawConnections = () => {
      const stage = document.getElementById('bracketStage');
      const bracket = document.getElementById('bracket');
      const svg = document.getElementById('bracketSvg');
      if (!stage || !bracket || !svg) return;
      const stageRect = stage.getBoundingClientRect();
      const rounds = Array.from(bracket.querySelectorAll('.round'));
      const width = Math.ceil(bracket.scrollWidth), height = Math.ceil(bracket.scrollHeight);
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.setAttribute('width', width); 
      svg.setAttribute('height', height); 
      svg.innerHTML = '';

      const createPath = (x1, y1, x2, y2, isWinner) => {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const midX = x1 + (x2 - x1) / 2;
        path.setAttribute('d', `M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}`);
        path.setAttribute('fill', 'none');
        if (isWinner) {
          path.setAttribute('stroke', '#7dd3fc');
          path.setAttribute('stroke-width', '3');
          path.setAttribute('filter', 'drop-shadow(0 0 6px rgba(125,211,252,0.6))');
        } else {
          path.setAttribute('stroke', 'rgba(125,211,252,0.15)');
          path.setAttribute('stroke-width', '1.5');
        }
        path.setAttribute('stroke-linejoin', 'round');
        return path;
      };

      for (let r = 0; r < rounds.length - 1; r++) {
        if (getComputedStyle(rounds[r]).display === 'none') continue;
        if (getComputedStyle(rounds[r + 1]).display === 'none') continue;

        const currentMatches = Array.from(rounds[r].querySelectorAll('.match'));
        const nextMatches = Array.from(rounds[r + 1].querySelectorAll('.match'));
        
        nextMatches.forEach((nextMatch, idx) => {
          const sourceA = currentMatches[idx * 2], sourceB = currentMatches[idx * 2 + 1];
          if (!sourceA || !sourceB) return;

          const aRect = sourceA.getBoundingClientRect();
          const bRect = sourceB.getBoundingClientRect();
          const nRect = nextMatch.getBoundingClientRect();

          const xA = aRect.right - stageRect.left;
          const yA = aRect.top + aRect.height / 2 - stageRect.top;
          
          const xB = bRect.right - stageRect.left;
          const yB = bRect.top + bRect.height / 2 - stageRect.top;

          const xN = nRect.left - stageRect.left;
          const yN = nRect.top + nRect.height / 2 - stageRect.top;

          const hasWinnerA = !!sourceA.querySelector('.slot.winner');
          const hasWinnerB = !!sourceB.querySelector('.slot.winner');

          svg.appendChild(createPath(xA, yA, xN, yN, hasWinnerA));
          svg.appendChild(createPath(xB, yB, xN, yN, hasWinnerB));
        });
      }
    };

    const relayoutAndRedraw = () => requestAnimationFrame(() => { layoutRounds(); requestAnimationFrame(drawConnections); });
    window.addEventListener('resize', relayoutAndRedraw);

    Promise.all([
      fetch('bracket-data.json?v=10').then(r => r.ok ? r.json() : Promise.reject(new Error('data fetch failed: ' + r.status))),
      fetch('player-profiles.json?v=10').then(r => r.ok ? r.json() : Promise.resolve(JSON.parse(document.getElementById('fallback-profiles').textContent)))
    ]).then(([data, profiles]) => {
      PROFILE_MAP = Object.fromEntries((profiles.players || []).map(p => [p.en, p]));
      console.log('Data loaded:', data.tournament?.lastUpdated);
      render(data);
    }).catch((err) => {
      console.error('Fetch error:', err);
      PROFILE_MAP = Object.fromEntries((JSON.parse(document.getElementById('fallback-profiles').textContent).players || []).map(p => [p.en, p]));
      render(JSON.parse(document.getElementById('fallback-data').textContent));
    });
  </script>
  <div class="footer">
    <span>数据来源: World Snooker Tour</span>
    <span id="updateTime"></span>
  </div>
  <script>
    fetch('./bracket-data.json').then(r => r.json()).then(data => {
      const time = data.tournament?.lastUpdated || '';
      if (time) {
        document.getElementById('updateTime').textContent = '最后更新: ' + time;
        const badge = document.getElementById('heroBadge');
        if (badge) badge.innerHTML = `LIVE UPDATE <span style="font-weight:500; opacity:0.9">${time}</span>`;
      }
    }).catch(() => {});
  </script>
</body>
</html>
